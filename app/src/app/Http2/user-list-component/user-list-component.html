<h2>User List</h2>

<ul>
  <li *ngFor="let user of users">
    {{ user.name }} - {{ user.email }}
    <button (click)="editUser(user)">Edit</button>
  </li>
</ul>

<form *ngIf="selectedUser" (ngSubmit)="onUpdate()">
  <input [(ngModel)]="selectedUser.name" name="name" placeholder="Name" required />
  <input [(ngModel)]="selectedUser.email" name="email" placeholder="Email" required />
  <input [(ngModel)]="selectedUser.phone" name="phone" placeholder="Phone" />
  <button type="submit">Update</button>
</form>

<p *ngIf="successmsgs">{{ successmsgs }}</p>
